<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaseHW Legal Information</title>
    <style>
        :root {
            --primary: #2196F3;
            --text-main: #333;
            --bg: #f8f9fa;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg);
            margin: 0;
            color: var(--text-main);
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 { margin-bottom: 30px; }
        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .btn {
            display: block;
            padding: 15px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .btn-alt {
            background: #eee;
            color: #333;
        }
        p { color: #666; margin-top: 30px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="card">
        <h1>BaseHW</h1>
        <div class="links">
            <a href="privacy.html" class="btn">Privacy Policy</a>
            <a href="terms.html" class="btn btn-alt">Terms of Use</a>
        </div>
        <p>&copy; 2026 BaseHW Team. All rights reserved.</p>
    </div>
</body>
</html>
